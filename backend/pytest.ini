[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:langsmith_plugin
filterwarnings =
    ignore:The 'timeout' parameter is deprecated. Please configure it in the http client instead.*:DeprecationWarning
    ignore:The 'verify' parameter is deprecated. Please configure it in the http client instead.*:DeprecationWarning
    ignore:This field is deprecated. Use `generate_page_images=True` and call `TableItem.get_image\(\)` to extract table images from page images\..*:DeprecationWarning
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
markers =
    integration: marks tests as integration tests (requires running services)
    performance: marks tests as performance/load tests
    llm: marks tests that require a live LLM (NVIDIA or Ollama)
    unit: marks fast unit tests with no external dependencies
    regression: marks regression tests
    database: marks tests that require database setup
    contract: marks endpoint contract validation tests
    pipeline: marks end-to-end pipeline behavior tests
    slow: marks tests that are expected to run slowly
    rag: marks tests for retrieval-augmented generation components
