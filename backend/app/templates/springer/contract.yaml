description: Springer Nature Template Contract
styles:
  # Structural
  BLOCK_TITLE: "Title"
  BLOCK_ABSTRACT_HEADING: "Abstract Heading"
  BLOCK_ABSTRACT_BODY: "Abstract"
  
  # Headings
  BLOCK_HEADING_1: "Heading 1"
  BLOCK_HEADING_2: "Heading 2"
  BLOCK_HEADING_3: "Heading 3"
  
  # Content
  BLOCK_BODY: "Normal"
  BLOCK_LIST_ITEM: "List Bullet"
  
  # References
  BLOCK_REFERENCES_HEADING: "Heading 1"
  BLOCK_REFERENCE_ENTRY: "Reference"
  
  # Captions
  BLOCK_CAPTION: "Caption"

layout:
  page_size: "A4"
  default_columns: 1
  line_spacing: 1.0
  margins:
    top: 0.75
    bottom: 0.75
    left: 0.75
    right: 0.75
  section_overrides:
    abstract: 1
    references: 1
    title: 1
  spacing:
    paragraph:
      before: 0
      after: 8
    heading:
      before: 14
      after: 6
