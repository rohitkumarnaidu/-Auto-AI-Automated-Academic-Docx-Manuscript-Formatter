description: Elsevier Journal Template Contract
styles:
  # Structural
  BLOCK_TITLE: "Title"
  BLOCK_ABSTRACT_HEADING: "Abstract Heading"
  BLOCK_ABSTRACT_BODY: "Abstract"

  # Headings
  BLOCK_HEADING_1: "Heading 1"
  BLOCK_HEADING_2: "Heading 2"
  BLOCK_HEADING_3: "Heading 3"
  BLOCK_HEADING_4: "Heading 4"

  # Content
  BLOCK_BODY: "Normal"
  BLOCK_LIST_ITEM: "List Bullet"

  # References
  BLOCK_REFERENCES_HEADING: "Heading 1"
  BLOCK_REFERENCE_ENTRY: "Bibliography"

  # Captions
  BLOCK_CAPTION: "Caption"

layout:
  page_size: "A4"
  default_columns: 1
  line_spacing: 1.0
  margins:
    top: 1.0
    bottom: 1.0
    left: 1.0
    right: 1.0
  section_overrides:
    abstract: 1
    references: 1
    title: 1
  spacing:
    paragraph:
      before: 0
      after: 8
    heading:
      before: 14
      after: 6
