publisher: "Modern Gold"
description: "A prestigious, clean design with gold typography highlights for premium manuscripts."

sections:
  required:
    - "abstract"
    - "introduction"
    - "references"
  order:
    - "title"
    - "abstract"
    - "keywords"
    - "introduction"
    - "methodology"
    - "results"
    - "discussion"
    - "conclusion"
    - "references"
  canonical_names:
    "summary": "abstract"

numbering:
  headings:
    1: "numeric"
    2: "decimal"
    3: "none"
  figures: "numeric"
  tables: "numeric"

styles:
  TITLE: "Title"
  AUTHOR: "Normal"
  AFFILIATION: "Normal"
  ABSTRACT_HEADING: "Heading 1"
  ABSTRACT_BODY: "Normal"
  KEYWORDS_HEADING: "Heading 2"
  KEYWORDS_BODY: "Normal"
  HEADING_1: "Heading 1"
  HEADING_2: "Heading 2"
  HEADING_3: "Heading 3"
  HEADING_4: "Heading 4"
  BODY: "Normal"
  REFERENCES_HEADING: "Heading 1"
  REFERENCE_ENTRY: "Reference"

references:
  style: "IEEE"
  citation_format: "[N]"
  normalization:
    enabled: true
    max_authors: 3
    et_al_suffix: "et al."

layout:
  default_columns: 1
  section_overrides: {}
  margins:
    top: 1.0
    bottom: 1.0
    left: 1.25
    right: 1.25
  spacing:
    paragraph:
      before: 0
      after: 12
    heading:
      before: 20
      after: 8
    title:
      before: 0
      after: 18
    references:
      before: 24
      after: 10
  page_breaks:
    before: ["references"]

equations:
  numbering: "numeric"
  scope: "global"
  brackets: "()"
  alignment: "center"
