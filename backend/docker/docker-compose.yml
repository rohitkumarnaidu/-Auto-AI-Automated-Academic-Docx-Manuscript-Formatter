version: '3.8'

services:
  # GROBID service for metadata extraction
  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: scholarform-grobid
    ports:
      - "8070:8070"
    environment:
      - GROBID_HEAP_SIZE=4096m
    volumes:
      - grobid-data:/opt/grobid/grobid-home/tmp
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8070/api/isalive" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: scholarform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ClamAV daemon for malware scanning
  clamav:
    image: clamav/clamav:latest
    container_name: scholarform-clamav
    ports:
      - "3310:3310"
    restart: unless-stopped

  # Celery Worker for async processing
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: scholarform-celery-worker-interactive
    command: celery -A app.tasks.celery_tasks worker -Q interactive -c 4 --loglevel=info
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROBID_URL=http://grobid:8070
      - GROBID_BASE_URL=http://grobid:8070
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    depends_on:
      - redis
      - grobid
      - clamav
    restart: unless-stopped

  celery_worker_batch:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: scholarform-celery-worker-batch
    command: celery -A app.tasks.celery_tasks worker -Q batch -c 2 --loglevel=info
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROBID_URL=http://grobid:8070
      - GROBID_BASE_URL=http://grobid:8070
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
    depends_on:
      - redis
      - grobid
      - clamav
    restart: unless-stopped

volumes:
  grobid-data:
  redis-data:
  postgres-data:
