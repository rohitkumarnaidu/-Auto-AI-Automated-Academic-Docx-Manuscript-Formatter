name: docker-publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tags:
        description: "Additional tags (space-separated)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  WORKER_IMAGE: ${{ github.repository }}/celery-worker

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      backend_tags: ${{ steps.meta-backend.outputs.tags }}
      backend_labels: ${{ steps.meta-backend.outputs.labels }}
      worker_tags: ${{ steps.meta-worker.outputs.tags }}
      worker_labels: ${{ steps.meta-worker.outputs.labels }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            echo "version=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.event.inputs.tags }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Docker metadata (worker)
        id: meta-worker
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}

  build-and-push-backend:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (backend)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        id: build-backend
        with:
          context: backend
          file: backend/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.prepare.outputs.backend_labels }}
          tags: ${{ needs.prepare.outputs.backend_tags }}
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: mode=max
          sbom: true

      - name: Attest backend image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ steps.build-backend.outputs.digest }}
          push-to-registry: true

  build-and-push-worker:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (celery worker)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        id: build-worker
        with:
          context: backend
          file: backend/docker/Dockerfile
          platforms: linux/amd64
          labels: ${{ needs.prepare.outputs.worker_labels }}
          tags: ${{ needs.prepare.outputs.worker_tags }}
          push: true
          target: runtime
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          build-args: |
            CELERY_WORKER=true
          provenance: mode=max
          sbom: true

      - name: Attest worker image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}
          subject-digest: ${{ steps.build-worker.outputs.digest }}
          push-to-registry: true

  sign-images:
    needs: [build-and-push-backend, build-and-push-worker]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign backend image
        run: |
          cosign sign --yes \
            --oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}@${{ needs.build-and-push-backend.outputs.digest }}"

      - name: Sign worker image
        run: |
          cosign sign --yes \
            --oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}@${{ needs.build-and-push-worker.outputs.digest }}"

  generate-sbom:
    needs: [build-and-push-backend, build-and-push-worker]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Generate CycloneDX SBOM (Python)
        run: |
          pip install cyclonedx-bom
          pip install -r backend/requirements.txt
          pip freeze > /tmp/pip-freeze.txt
          cyclonedx-py requirements /tmp/pip-freeze.txt --output-format json -o sbom/backend-sbom.json

      - name: Generate CycloneDX SBOM (npm)
        working-directory: ./frontend
        run: |
          npm ci
          npx --yes @cyclonedx/cyclonedx-npm --output-format JSON --output-file ../sbom/frontend-sbom.json

      - name: Attest backend SBOM
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          subject-digest: ${{ needs.build-and-push-backend.outputs.digest }}
          predicate-type: "https://cyclonedx.org/bom"
          predicate-path: sbom/backend-sbom.json

      - name: Attest worker SBOM
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE }}
          subject-digest: ${{ needs.build-and-push-worker.outputs.digest }}
          predicate-type: "https://cyclonedx.org/bom"
          predicate-path: sbom/backend-sbom.json
