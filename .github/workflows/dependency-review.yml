name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: true
          allow-licenses: >-
            MIT, BSD-2-Clause, BSD-3-Clause, Apache-2.0, ISC,
            Python-2.0, PSF, MPL-2.0, Unlicense, CC0-1.0, 0BSD
          deny-licenses: >-
            AGPL-3.0, GPL-3.0, GPL-2.0, LGPL-3.0, BSL-1.0
          warn-only: false
