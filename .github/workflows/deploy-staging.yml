name: deploy-staging

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend to Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_STAGING_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
        run: |
          curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_STAGING_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":false}'

      - name: Wait for backend health
        env:
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: |
          for i in {1..30}; do
            if curl -fsS "${STAGING_BACKEND_URL}/api/v1/health/ready" >/dev/null; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "Waiting for backend health..."
            sleep 10
          done
          echo "Backend failed health check."
          exit 1

      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_STAGING_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
        working-directory: frontend
        run: |
          npm i -g vercel
          VERCEL_ORG_ID=${VERCEL_ORG_ID} VERCEL_PROJECT_ID=${VERCEL_STAGING_PROJECT_ID} \
            vercel deploy --prod --yes --token ${VERCEL_TOKEN}
