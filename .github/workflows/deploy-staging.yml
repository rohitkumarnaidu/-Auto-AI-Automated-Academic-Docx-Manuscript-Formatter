name: deploy-staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        id: preflight
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_STAGING_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_STAGING_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
        run: |
          missing=()
          [ -z "${STAGING_BACKEND_URL}" ] && missing+=("STAGING_BACKEND_URL")
          [ -z "${VERCEL_TOKEN}" ] && missing+=("VERCEL_TOKEN")
          [ -z "${VERCEL_ORG_ID}" ] && missing+=("VERCEL_ORG_ID")
          [ -z "${VERCEL_STAGING_PROJECT_ID}" ] && missing+=("VERCEL_STAGING_PROJECT_ID")

          deploy_mode=""
          if [ -n "${RENDER_STAGING_DEPLOY_HOOK_URL}" ]; then
            deploy_mode="hook"
          elif [ -n "${RENDER_API_KEY}" ] && [ -n "${RENDER_STAGING_SERVICE_ID}" ]; then
            if [[ "${RENDER_STAGING_SERVICE_ID}" =~ ^srv- ]]; then
              deploy_mode="api"
            else
              missing+=("RENDER_STAGING_SERVICE_ID (must start with srv-)")
            fi
          else
            missing+=("RENDER_STAGING_DEPLOY_HOOK_URL or (RENDER_API_KEY + RENDER_STAGING_SERVICE_ID)")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping staging deploy. Missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=${deploy_mode}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run database migrations
        if: steps.preflight.outputs.ready == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          pip install -r requirements-render.txt
          alembic upgrade head

      - name: Deploy backend to Render (Deploy Hook)
        if: steps.preflight.outputs.ready == 'true' && steps.preflight.outputs.deploy_mode == 'hook'
        env:
          RENDER_STAGING_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering staging backend deploy via Render deploy hook..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${RENDER_STAGING_DEPLOY_HOOK_URL}")
          echo "Status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != 2* ]]; then
            echo "Deploy hook returned HTTP $HTTP_STATUS. Check RENDER_STAGING_DEPLOY_HOOK_URL."
            exit 1
          fi

      - name: Deploy backend to Render
        if: steps.preflight.outputs.ready == 'true' && steps.preflight.outputs.deploy_mode == 'api'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_STAGING_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
        run: |
          echo "Triggering staging deploy for service: ${RENDER_STAGING_SERVICE_ID}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_STAGING_SERVICE_ID}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [[ "$HTTP_STATUS" != 2* ]]; then
            echo "Deploy API returned HTTP $HTTP_STATUS. Check RENDER_API_KEY and RENDER_STAGING_SERVICE_ID."
            exit 1
          fi

      - name: Wait for backend health
        if: steps.preflight.outputs.ready == 'true'
        env:
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: |
          echo "Waiting for staging backend at ${STAGING_BACKEND_URL}..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_BACKEND_URL}/api/v1/health/live")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging backend is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Staging health check timed out after 20 attempts."
          exit 1

      - name: Set up Python for load tests
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Locust dependencies
        if: steps.preflight.outputs.ready == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install locust websocket-client

      - name: Run strict Locust SLO gate against staging
        if: steps.preflight.outputs.ready == 'true'
        env:
          STAGING_BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
          LOCUST_TARGET_P95_MS: "500"
          LOCUST_TARGET_RPS: "100"
          LOCUST_MAX_FAIL_RATIO: "0"
        run: |
          locust -f backend/tests/load/locustfile.py \
            --headless \
            --host "${STAGING_BACKEND_URL}" \
            --users 220 \
            --spawn-rate 25 \
            --run-time 3m \
            --only-summary

      - name: Deploy frontend to Vercel
        if: steps.preflight.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_STAGING_PROJECT_ID: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
        run: |
          npx vercel@latest --version
          VERCEL_ORG_ID=${VERCEL_ORG_ID} VERCEL_PROJECT_ID=${VERCEL_STAGING_PROJECT_ID} \
            npx vercel@latest deploy --prod --yes --token ${VERCEL_TOKEN}

      - name: Deployment skipped
        if: steps.preflight.outputs.ready != 'true'
        run: |
          echo "Staging deploy skipped because required secrets are not configured."
          echo "Missing: ${{ steps.preflight.outputs.missing }}"
