name: security

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Set up Java for OWASP DC
        run: sudo apt-get update && sudo apt-get install -y default-jre-headless

      - name: Build backend image
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        run: docker build -f backend/docker/Dockerfile -t scholarform-backend backend

      - name: Trivy scan
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e
        with:
          image-ref: scholarform-backend
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Bandit scan
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        run: |
          pip install bandit
          bandit -r backend/app -f json -o bandit-report.json

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bandit-report
          path: bandit-report.json

      - name: OWASP Dependency Check
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        uses: dependency-check/Dependency-Check_Action@1e54355a8b4c8abaa8cc7d0b70aa655a3bb15a6c
        with:
          project: "scholarform-backend"
          path: "backend"
          format: "JSON"
          out: "dependency-check-report"
          args: "--scan backend/requirements-render.txt --failOnCVSS 7"

      - name: Upload OWASP Dependency-Check report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dependency-check-report
          path: dependency-check-report/
