name: deploy-production

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        id: preflight
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_PROD_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID }}
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROD_PROJECT_ID: ${{ secrets.VERCEL_PROD_PROJECT_ID }}
        run: |
          missing=()
          [ -z "${RENDER_API_KEY}" ] && missing+=("RENDER_API_KEY")
          [ -z "${RENDER_PROD_SERVICE_ID}" ] && missing+=("RENDER_PROD_SERVICE_ID")
          [ -z "${PROD_BACKEND_URL}" ] && missing+=("PROD_BACKEND_URL")
          [ -z "${VERCEL_TOKEN}" ] && missing+=("VERCEL_TOKEN")
          [ -z "${VERCEL_ORG_ID}" ] && missing+=("VERCEL_ORG_ID")
          [ -z "${VERCEL_PROD_PROJECT_ID}" ] && missing+=("VERCEL_PROD_PROJECT_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping production deploy. Missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend to Render
        if: steps.preflight.outputs.ready == 'true'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_PROD_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID }}
        run: |
          echo "Triggering deploy for service: ${RENDER_PROD_SERVICE_ID}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_PROD_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":false}')
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "Deploy API returned HTTP $HTTP_STATUS. Check RENDER_API_KEY and RENDER_PROD_SERVICE_ID secrets."
            exit 1
          fi
          echo "Deploy triggered successfully."

      - name: Wait for backend health
        if: steps.preflight.outputs.ready == 'true'
        env:
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL }}
        run: |
          echo "Waiting for backend at ${PROD_BACKEND_URL}..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_BACKEND_URL}/api/v1/health/")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Health check timed out; deploy may still be proceeding."
          exit 0

      - name: Deploy frontend to Vercel
        if: steps.preflight.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROD_PROJECT_ID: ${{ secrets.VERCEL_PROD_PROJECT_ID }}
        working-directory: frontend
        run: |
          npm i -g vercel
          VERCEL_ORG_ID=${VERCEL_ORG_ID} VERCEL_PROJECT_ID=${VERCEL_PROD_PROJECT_ID} \
            vercel deploy --prod --yes --token ${VERCEL_TOKEN}

      - name: Deployment skipped
        if: steps.preflight.outputs.ready != 'true'
        run: |
          echo "Production deploy skipped because required secrets are not configured."
          echo "Missing: ${{ steps.preflight.outputs.missing }}"
