name: deploy-production

on:
  workflow_dispatch:

jobs:
  verify-ci-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Check backend-ci workflow status
        uses: actions/github-script@v9
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'backend-ci.yml',
              branch: context.ref || 'main',
              status: 'success',
              per_page: 5
            });
            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('No successful backend-ci runs found on this branch');
            }

      - name: Check security workflow status
        uses: actions/github-script@v9
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'security.yml',
              branch: context.ref || 'main',
              status: 'success',
              per_page: 5
            });
            if (runs.data.workflow_runs.length === 0) {
              core.setFailed('No successful security runs found on this branch');
            }

  pre-deploy-health:
    runs-on: ubuntu-latest
    needs: verify-ci-gates
    environment: production
    steps:
      - name: Pre-deployment health check
        env:
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL || vars.PROD_BACKEND_URL }}
        run: |
          echo "Running pre-deployment health check..."
          STATUS=$(curl -L -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${PROD_BACKEND_URL}/api/v1/health/live")
          echo "Current production health: HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Production is healthy, proceeding with deploy."
          else
            echo "::warning::Production health check returned HTTP $STATUS. Proceeding with caution."
          fi

  deploy-production:
    runs-on: ubuntu-latest
    needs: [verify-ci-gates, pre-deploy-health]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deploy secrets
        id: preflight
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY || vars.RENDER_API_KEY }}
          RENDER_PROD_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID || vars.RENDER_PROD_SERVICE_ID }}
          RENDER_PROD_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_URL || vars.RENDER_PROD_DEPLOY_HOOK_URL }}
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL || vars.PROD_BACKEND_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || vars.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
          VERCEL_PROD_PROJECT_ID: ${{ secrets.VERCEL_PROD_PROJECT_ID || vars.VERCEL_PROD_PROJECT_ID }}
        run: |
          missing=()
          [ -z "${PROD_BACKEND_URL}" ] && missing+=("PROD_BACKEND_URL")
          [ -z "${VERCEL_TOKEN}" ] && missing+=("VERCEL_TOKEN")
          [ -z "${VERCEL_ORG_ID}" ] && missing+=("VERCEL_ORG_ID")
          [ -z "${VERCEL_PROD_PROJECT_ID}" ] && missing+=("VERCEL_PROD_PROJECT_ID")

          deploy_mode=""
          if [ -n "${RENDER_PROD_DEPLOY_HOOK_URL}" ]; then
            deploy_mode="hook"
          elif [ -n "${RENDER_API_KEY}" ] && [ -n "${RENDER_PROD_SERVICE_ID}" ]; then
            if [[ "${RENDER_PROD_SERVICE_ID}" =~ ^srv- ]]; then
              deploy_mode="api"
            else
              missing+=("RENDER_PROD_SERVICE_ID (must start with srv-)")
            fi
          else
            missing+=("RENDER_PROD_DEPLOY_HOOK_URL or (RENDER_API_KEY + RENDER_PROD_SERVICE_ID)")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping production deploy. Missing secrets: ${missing[*]}"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=${deploy_mode}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run database migrations
        if: steps.preflight.outputs.ready == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          pip install -r requirements-render.txt
          alembic upgrade head

      - name: Deploy backend to Render (Deploy Hook)
        id: deploy
        if: steps.preflight.outputs.ready == 'true' && steps.preflight.outputs.deploy_mode == 'hook'
        env:
          RENDER_PROD_DEPLOY_HOOK_URL: ${{ secrets.RENDER_PROD_DEPLOY_HOOK_URL || vars.RENDER_PROD_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering backend deploy via Render deploy hook..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${RENDER_PROD_DEPLOY_HOOK_URL}")
          echo "Status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" != 2* ]]; then
            echo "Deploy hook returned HTTP $HTTP_STATUS. Check RENDER_PROD_DEPLOY_HOOK_URL."
            exit 1
          fi
          echo "Deploy hook triggered successfully."

      - name: Deploy backend to Render
        id: deploy-api
        if: steps.preflight.outputs.ready == 'true' && steps.preflight.outputs.deploy_mode == 'api'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY || vars.RENDER_API_KEY }}
          RENDER_PROD_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID || vars.RENDER_PROD_SERVICE_ID }}
        run: |
          echo "Triggering deploy for service: ${RENDER_PROD_SERVICE_ID}"
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://api.render.com/v1/services/${RENDER_PROD_SERVICE_ID}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [[ "$HTTP_STATUS" != 2* ]]; then
            echo "Deploy API returned HTTP $HTTP_STATUS. Check RENDER_API_KEY and RENDER_PROD_SERVICE_ID secrets."
            exit 1
          fi
          echo "Deploy triggered successfully."

      - name: Wait for backend health
        if: steps.preflight.outputs.ready == 'true'
        env:
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL || vars.PROD_BACKEND_URL }}
        run: |
          echo "Waiting for backend at ${PROD_BACKEND_URL}..."
          for i in {1..20}; do
            STATUS=$(curl -L -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${PROD_BACKEND_URL}/api/v1/health/live")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "Backend health check timed out."
          exit 1

      - name: Post-deployment verification
        if: steps.preflight.outputs.ready == 'true'
        env:
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL || vars.PROD_BACKEND_URL }}
        run: |
          echo "Running post-deployment verification..."
          STATUS=$(curl -L -sS --connect-timeout 5 --max-time 10 -o /dev/null -w "%{http_code}" "${PROD_BACKEND_URL}/api/v1/health/live")
          if [ "$STATUS" != "200" ]; then
            echo "Post-deployment health check failed with HTTP $STATUS"
            exit 1
          fi
          echo "Post-deployment verification passed."

      - name: Auto-rollback on health check failure
        if: failure() && (steps.deploy.outcome == 'success' || steps.deploy-api.outcome == 'success')
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY || vars.RENDER_API_KEY }}
          RENDER_PROD_SERVICE_ID: ${{ secrets.RENDER_PROD_SERVICE_ID || vars.RENDER_PROD_SERVICE_ID }}
        run: |
          echo "Health check failed, initiating rollback..."
          DEPLOY_ID="${{ steps.deploy.outputs.deploy_id || steps.deploy-api.outputs.deploy_id }}"
          curl -X POST "https://api.render.com/v1/services/${RENDER_PROD_SERVICE_ID}/deploys/${DEPLOY_ID}/rollback" \
            -H "Authorization: Bearer ${RENDER_API_KEY}"

      - name: Deploy frontend to Vercel
        if: steps.preflight.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || vars.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
          VERCEL_PROD_PROJECT_ID: ${{ secrets.VERCEL_PROD_PROJECT_ID || vars.VERCEL_PROD_PROJECT_ID }}
        run: |
          npx vercel@latest --version
          VERCEL_ORG_ID=${VERCEL_ORG_ID} VERCEL_PROJECT_ID=${VERCEL_PROD_PROJECT_ID} \
            npx vercel@latest deploy --prod --yes --token ${VERCEL_TOKEN}

      - name: Deployment skipped
        if: steps.preflight.outputs.ready != 'true'
        run: |
          echo "Production deploy skipped because required secrets are not configured."
          echo "Missing: ${{ steps.preflight.outputs.missing }}"
