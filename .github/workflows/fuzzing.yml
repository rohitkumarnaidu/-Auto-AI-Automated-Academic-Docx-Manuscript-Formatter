name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'fuzz/**'

permissions:
  contents: read

jobs:
  fuzzing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install fuzzing dependencies
        working-directory: fuzz
        run: pip install atheris

      - name: Build fuzzers
        working-directory: fuzz
        run: |
          python -c "
          import sys
          sys.path.insert(0, '../backend/app')
          from fuzz_document_title import fuzz
          print('Fuzz targets compiled successfully')
          "

      - name: Run fuzz tests (smoke)
        working-directory: fuzz
        run: |
          python -m atheris --seconds=5 fuzz_document_title.py
          python -m atheris --seconds=5 fuzz_metadata_parser.py
