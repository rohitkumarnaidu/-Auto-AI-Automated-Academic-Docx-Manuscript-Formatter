name: CIFuzz

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'fuzz/**'

permissions:
  contents: read

jobs:
  fuzzing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install fuzzing dependencies
        working-directory: fuzz
        run: pip install atheris

      - name: Build fuzzers
        working-directory: fuzz
        run: |
          python -c "
          import sys
          sys.path.insert(0, '../backend/app')
          from fuzz_document_title import fuzz
          print('Fuzz targets compiled successfully')
          "

      - name: Run fuzz tests (smoke)
        working-directory: fuzz
        run: |
          python -m atheris --seconds=5 fuzz_document_title.py
          python -m atheris --seconds=5 fuzz_metadata_parser.py
