name: create-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read
  attestations: read
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $GITHUB_REF_NAME"
          echo "Version: $VERSION"

      - name: Verify tag matches version files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CANONICAL=$(python scripts/sync_version.py --show)
          if [ "$CANONICAL" != "$VERSION" ]; then
            echo "ERROR: version mismatch — tag is $VERSION, canonical version is $CANONICAL"
            echo "Fix: python scripts/sync_version.py to sync all files, then re-tag."
            exit 1
          fi
          python scripts/sync_version.py --check

      - name: Determine pre-release status
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -Eq '(rc|beta|alpha|preview)\.[0-9]+$'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  release-notes:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      body: ${{ steps.generate.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Generate changelog from git log
        id: changelog
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1 || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found. Using all commits."
            LOG=$(git log --pretty=format:"- %s (%h) @%an" --no-merges)
          else
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h) @%an" --no-merges)
            echo "Previous tag: $PREV_TAG"
          fi
          echo "log<<LOGDELIM" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "LOGDELIM" >> "$GITHUB_OUTPUT"

      - name: Categorize changes
        id: categorize
        run: |
          FEAT=""; FIX=""; DOCS=""; SECURITY=""; CHORE=""; UNCAT=""
          while IFS= read -r line; do
            TYPE=$(echo "$line" | sed -n 's/- \([a-z]*\).*/\1/p')
            NL=$'\n'
            case "$TYPE" in
              feat|feature)     FEAT="${FEAT}${line}${NL}" ;;
              fix|bug)          FIX="${FIX}${line}${NL}" ;;
              docs|doc)         DOCS="${DOCS}${line}${NL}" ;;
              security|sec)     SECURITY="${SECURITY}${line}${NL}" ;;
              chore|ci|build|refactor|perf|test) CHORE="${CHORE}${line}${NL}" ;;
              *)                UNCAT="${UNCAT}${line}${NL}" ;;
            esac
          done <<< "${{ steps.changelog.outputs.log }}"

          {
            echo "features<<SECTION"
            echo "$FEAT"
            echo "SECTION"
            echo "fixes<<SECTION"
            echo "$FIX"
            echo "SECTION"
            echo "docs<<SECTION"
            echo "$DOCS"
            echo "SECTION"
            echo "security<<SECTION"
            echo "$SECURITY"
            echo "SECTION"
            echo "maintenance<<SECTION"
            echo "$CHORE"
            echo "SECTION"
            echo "uncategorized<<SECTION"
            echo "$UNCAT"
            echo "SECTION"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes from GitHub API
        id: generate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.verify.outputs.version }}"
          TAG_NAME="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"
          REGISTRY="${{ env.REGISTRY }}"

          # Use GitHub Release Notes API as the authoritative source
          GENERATED=$(gh api \
            "/repos/$REPO/releases/generate-notes" \
            --field tag_name="$TAG_NAME" \
            --field target_commitish="main" \
            --jq '.body' 2>/dev/null || echo "")

          if [ -z "$GENERATED" ]; then
            GENERATED="> See CHANGELOG.md for the full list of changes."
          fi

          # Write release body to a file (prevents heredoc escaping issues)
          cat > release-body.md << ENDMARKER
          ## ScholarForm AI $VERSION

          $GENERATED

          ---

          ## Docker Images

          Pull from GitHub Container Registry:

          \`\`\`bash
          docker pull $REGISTRY/$REPO/backend:$VERSION
          docker pull $REGISTRY/$REPO/celery-worker:$VERSION
          \`\`\`

          **Verify image signature:**
          \`\`\`bash
          cosign verify $REGISTRY/$REPO/backend:$VERSION \\
            --certificate-identity-regexp "https://github.com/$REPO.*" \\
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          \`\`\`

          **Verify build provenance:**
          \`\`\`bash
          gh attestation verify $REGISTRY/$REPO/backend:$VERSION \\
            --repo $REPO
          \`\`\`

          ## Packages

          \`\`\`bash
          npm install @$OWNER/frontend@$VERSION
          pip install scholarform-backend==$VERSION
          \`\`\`

          ## Release Assets

          | Asset | Description |
          |-------|-------------|
          | \`release-checksums.txt\` | SHA256 checksums of all artifacts |
          | \`backend-sbom.json\` | Backend CycloneDX SBOM (Python deps) |
          | \`frontend-sbom.json\` | Frontend CycloneDX SBOM (npm deps) |

          \`\`\`bash
          gh release download $TAG_NAME
          sha256sum -c release-checksums.txt
          \`\`\`

          ---

          *Full changelog: https://github.com/$REPO/releases/tag/$TAG_NAME*
          ENDMARKER

          echo "body<<BODYDELIM" >> "$GITHUB_OUTPUT"
          cat release-body.md >> "$GITHUB_OUTPUT"
          echo "BODYDELIM" >> "$GITHUB_OUTPUT"

  create:
    runs-on: ubuntu-latest
    needs: [verify, release-notes]
    outputs:
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Generate checksums
        run: |
          sha256sum backend/pyproject.toml frontend/package.json > release-checksums.txt
          cat release-checksums.txt

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          name: ScholarForm AI ${{ github.ref_name }}
          body: ${{ needs.release-notes.outputs.body }}
          draft: false
          prerelease: ${{ needs.verify.outputs.is_prerelease }}
          files: |
            release-checksums.txt
            sbom/backend-sbom.json
            sbom/frontend-sbom.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    runs-on: ubuntu-latest
    needs: [verify, create]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Generate release SBOM
        run: |
          pip install cyclonedx-bom
          pip freeze | cyclonedx-py -- --output-format json -o sbom/release-sbom.json 2>/dev/null || echo "{}" > sbom/release-sbom.json
          COMPONENTS=$(jq '.components | length // 0' sbom/release-sbom.json)
          echo "SBOM generated with $COMPONENTS components"

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            sbom/release-sbom.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  attest:
    if: ${{ needs.verify.outputs.is_prerelease == 'false' }}
    needs: [verify, create, sbom]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Regenerate checksums (separate job workspace)
        run: |
          sha256sum backend/pyproject.toml frontend/package.json > release-checksums.txt
          cat release-checksums.txt

      - name: Download release SBOM from release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p sbom
          gh release download ${{ github.ref_name }} --pattern "sbom/release-sbom.json" --dir sbom/ 2>/dev/null || echo "SBOM not yet uploaded, skipping"

      - name: Attest release checksums
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: release-checksums.txt

      - name: Attest SBOM
        if: ${{ hashFiles('sbom/release-sbom.json') != '' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: sbom/release-sbom.json
