name: SLSA Provenance

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  slsa:
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.digests }}"
      upload-assets: true
      provenance-name: "scholarform.intoto.jsonl"

  attest:
    runs-on: ubuntu-latest
    needs: slsa
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download SLSA provenance
        uses: actions/download-artifact@v4
        with:
          name: "${{ needs.slsa.outputs.provenance-name }}"
          path: provenance/

      - name: Verify provenance
        run: |
          echo "SLSA provenance generated at provenance/${{ needs.slsa.outputs.provenance-name }}"
          cat provenance/*.jsonl | head -20

      - name: Upload provenance to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: provenance/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
