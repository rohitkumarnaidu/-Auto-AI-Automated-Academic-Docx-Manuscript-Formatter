name: SLSA Provenance

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

jobs:
  attest-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Download release assets for attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}"
          echo "=== Downloaded files ==="
          ls -la

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: "*"
          subject-name: ${{ github.repository }}/release-${{ github.event.release.tag_name }}

      - name: Generate provenance summary
        run: |
          cat <<EOF
          OK: SLSA-compatible provenance generated for release ${{ github.event.release.tag_name }}
          Artifacts attested:
          $(ls -1)
          EOF
