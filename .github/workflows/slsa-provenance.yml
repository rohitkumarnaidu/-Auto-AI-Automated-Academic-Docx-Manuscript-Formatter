name: SLSA Provenance

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  actions: read
  attestations: write
  contents: write
  id-token: write

jobs:
  attest-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Download release assets for attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.event.release.tag_name }}"
          echo "=== Downloaded files ==="
          ls -la

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: "*"
          subject-name: ${{ github.repository }}/release-${{ github.event.release.tag_name }}

      - name: Generate provenance summary
        run: |
          cat <<EOF
          OK: SLSA-compatible provenance generated for release ${{ github.event.release.tag_name }}
          Artifacts attested:
          $(ls -1)
          EOF
