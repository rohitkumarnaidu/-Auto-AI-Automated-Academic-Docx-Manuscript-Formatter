name: e2e-production

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - deploy-production
    types:
      - completed

jobs:
  e2e-production:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate E2E secrets
        id: preflight
        env:
          PROD_FRONTEND_URL: ${{ secrets.PROD_FRONTEND_URL }}
        run: |
          if [ -z "${PROD_FRONTEND_URL}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping E2E tests because PROD_FRONTEND_URL is missing."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.preflight.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.preflight.outputs.ready == 'true'
        run: npx playwright install

      - name: Run Playwright tests
        if: steps.preflight.outputs.ready == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PROD_FRONTEND_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          CI: "1"
        run: npx playwright test

      - name: E2E skipped
        if: steps.preflight.outputs.ready != 'true'
        run: echo "E2E tests skipped because required secrets are not configured."
