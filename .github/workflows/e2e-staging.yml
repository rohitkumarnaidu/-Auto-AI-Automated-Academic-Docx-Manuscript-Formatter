name: e2e-staging

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - deploy-staging
    types:
      - completed

permissions:
  contents: read

jobs:
  e2e-staging:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Validate E2E secrets
        id: preflight
        env:
          STAGING_FRONTEND_URL: ${{ secrets.STAGING_FRONTEND_URL }}
        run: |
          if [ -z "${STAGING_FRONTEND_URL}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping E2E tests because STAGING_FRONTEND_URL is missing."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.preflight.outputs.ready == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"

      - name: Install dependencies
        if: steps.preflight.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.preflight.outputs.ready == 'true'
        run: npx playwright install

      - name: Run Playwright tests
        if: steps.preflight.outputs.ready == 'true'
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_FRONTEND_URL }}
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          CI: "1"
        run: npx playwright test

      - name: E2E skipped
        if: steps.preflight.outputs.ready != 'true'
        run: echo "E2E tests skipped because required secrets are not configured."
