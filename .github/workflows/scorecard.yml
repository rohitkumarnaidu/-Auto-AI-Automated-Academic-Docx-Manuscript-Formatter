name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif

      - name: Generate badge endpoint
        uses: actions/github-script@v9
        with:
          script: |
            const scorecard = require('./results.sarif');
            const score = scorecard.runs[0].results.reduce((acc, r) => {
              const s = r.message.text.match(/Score:\s*(\d+\.\d+)/);
              return s ? [...acc, parseFloat(s[1])] : acc;
            }, []);
            const avg = score.length ? (score.reduce((a,b) => a+b, 0) / score.length).toFixed(1) : 'N/A';
            core.exportVariable('SCORECARD_SCORE', avg);

      - name: Create Scorecard badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.SCORECARD_GIST_ID }}
          filename: scholarform-scorecard.json
          label: OpenSSF Scorecard
          message: ${{ env.SCORECARD_SCORE }}/10
          color: ${{ env.SCORECARD_SCORE >= 8 && 'brightgreen' || env.SCORECARD_SCORE >= 6 && 'yellow' || 'red' }}
          namedLogo: OpenSSF
