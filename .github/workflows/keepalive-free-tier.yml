name: keepalive-free-tier

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend live endpoint
        env:
          PROD_BACKEND_URL: ${{ secrets.PROD_BACKEND_URL || vars.PROD_BACKEND_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PROD_BACKEND_URL}" ]; then
            echo "PROD_BACKEND_URL is not configured."
            exit 1
          fi
          TARGET="${PROD_BACKEND_URL%/}/api/v1/health/live"
          backend_ok=0
          for attempt in {1..6}; do
            STATUS=$(curl -sS -L --connect-timeout 5 --max-time 12 -o /dev/null -w "%{http_code}" "${TARGET}" || true)
            echo "backend attempt ${attempt}: ${TARGET} -> HTTP ${STATUS}"
            if [ "${STATUS}" = "200" ]; then
              backend_ok=1
              break
            fi
            sleep 10
          done
          if [ "${backend_ok}" -ne 1 ]; then
            echo "Backend live endpoint unhealthy after retries."
            exit 1
          fi

      - name: Ping Hugging Face primary/shadow services
        env:
          HF_GROBID_PRIMARY_URL: ${{ secrets.HF_GROBID_PRIMARY_URL || vars.HF_GROBID_PRIMARY_URL }}
          HF_GROBID_SHADOW_URL: ${{ secrets.HF_GROBID_SHADOW_URL || vars.HF_GROBID_SHADOW_URL }}
          HF_DOCLING_PRIMARY_URL: ${{ secrets.HF_DOCLING_PRIMARY_URL || vars.HF_DOCLING_PRIMARY_URL }}
          HF_DOCLING_SHADOW_URL: ${{ secrets.HF_DOCLING_SHADOW_URL || vars.HF_DOCLING_SHADOW_URL }}
          HF_OCR_PRIMARY_URL: ${{ secrets.HF_OCR_PRIMARY_URL || vars.HF_OCR_PRIMARY_URL }}
          HF_OCR_SHADOW_URL: ${{ secrets.HF_OCR_SHADOW_URL || vars.HF_OCR_SHADOW_URL }}
          HF_DOCX_PRIMARY_URL: ${{ secrets.HF_DOCX_PRIMARY_URL || vars.HF_DOCX_PRIMARY_URL }}
          HF_DOCX_SHADOW_URL: ${{ secrets.HF_DOCX_SHADOW_URL || vars.HF_DOCX_SHADOW_URL }}
          HF_NOUGAT_PRIMARY_URL: ${{ secrets.HF_NOUGAT_PRIMARY_URL || vars.HF_NOUGAT_PRIMARY_URL }}
          HF_NOUGAT_SHADOW_URL: ${{ secrets.HF_NOUGAT_SHADOW_URL || vars.HF_NOUGAT_SHADOW_URL }}
          HF_SCIBERT_PRIMARY_URL: ${{ secrets.HF_SCIBERT_PRIMARY_URL || vars.HF_SCIBERT_PRIMARY_URL }}
          HF_SCIBERT_SHADOW_URL: ${{ secrets.HF_SCIBERT_SHADOW_URL || vars.HF_SCIBERT_SHADOW_URL }}
        run: |
          set -euo pipefail

          is_healthy_status() {
            local status="$1"
            case "${status}" in
              2??|412)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          probe_url() {
            local service="$1"
            local role="$2"
            local base_url="$3"
            local health_path="$4"

            if [ -z "${base_url}" ]; then
              echo "${service} (${role}): missing URL"
              return 1
            fi

            local target="${base_url%/}${health_path}"
            local status
            status=$(curl -sS -L --connect-timeout 5 --max-time 12 -o /dev/null -w "%{http_code}" "${target}" || true)
            echo "${service} (${role}): ${target} -> HTTP ${status}"
            is_healthy_status "${status}"
          }

          probe_with_fallbacks() {
            local service="$1"
            local role="$2"
            local base_url="$3"
            local preferred_path="$4"

            local paths=("${preferred_path}" "/health" "/openapi.json" "/")
            local seen="|"
            local p

            for p in "${paths[@]}"; do
              [ -z "${p}" ] && continue
              if [[ "${seen}" == *"|${p}|"* ]]; then
                continue
              fi
              seen="${seen}${p}|"
              if probe_url "${service}" "${role}" "${base_url}" "${p}"; then
                return 0
              fi
            done

            return 1
          }

          check_pair() {
            local service="$1"
            local primary="$2"
            local shadow="$3"
            local health_path="$4"

            if probe_with_fallbacks "${service}" "primary" "${primary}" "${health_path}"; then
              return 0
            fi
            if probe_with_fallbacks "${service}" "shadow" "${shadow}" "${health_path}"; then
              return 0
            fi
            echo "${service}: all endpoints failed"
            return 1
          }

          rc=0
          check_pair "grobid" "${HF_GROBID_PRIMARY_URL}" "${HF_GROBID_SHADOW_URL}" "/api/isalive" || rc=1
          check_pair "docling" "${HF_DOCLING_PRIMARY_URL}" "${HF_DOCLING_SHADOW_URL}" "/health" || rc=1
          check_pair "ocr" "${HF_OCR_PRIMARY_URL}" "${HF_OCR_SHADOW_URL}" "/health" || rc=1
          check_pair "docx-converter" "${HF_DOCX_PRIMARY_URL}" "${HF_DOCX_SHADOW_URL}" "/health" || rc=1
          check_pair "nougat" "${HF_NOUGAT_PRIMARY_URL}" "${HF_NOUGAT_SHADOW_URL}" "/health" || rc=1
          check_pair "scibert" "${HF_SCIBERT_PRIMARY_URL}" "${HF_SCIBERT_SHADOW_URL}" "/health" || rc=1

          exit "${rc}"
