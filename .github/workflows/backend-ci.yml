name: backend-ci

on:
  push:
    branches: ["**"]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-render.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Prepare env
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-render.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov pytest-mock

      - name: Ruff
        run: python -m ruff check app --config ruff.toml --select E9,F63,F7,F82

      - name: Mypy
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini app

      - name: Pytest with coverage
        run: python -m pytest tests -m "not integration and not llm" -x -q --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=20

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
