name: backend-ci

on:
  push:
    branches:
      - "**"

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare env
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-render.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov pytest-mock

      - name: Ruff
        run: python -m ruff check app --config ruff.toml --select E9,F63,F7,F82

      - name: Mypy
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini app

      - name: Pytest
        run: python -m pytest -m "not integration and not slow"
