name: backend-ci

on:
  push:
    branches: ["**"]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - 'requirements*.txt'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
      - 'requirements*.txt'

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-v1
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit

      - name: Ruff
        run: python -m ruff check app --config ruff.toml --select E9,F63,F7,F82

      - name: Mypy
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini app

      - name: Bandit (SAST)
        run: python -m bandit -r app -x app/tests -ll

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety

      - name: pip-audit (CVE scan)
        continue-on-error: true
        run: |
          python -m pip_audit --requirement requirements.txt \
            --require-license --desc

      - name: Safety (CVE scan)
        continue-on-error: true
        run: |
          python -m safety check -r requirements.txt

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('backend/requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Free up disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Pytest with coverage
        timeout-minutes: 20
        run: python -m pytest tests -m "not integration and not llm and not contract" -x -q --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=20

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: coverage-report
          path: coverage.xml
