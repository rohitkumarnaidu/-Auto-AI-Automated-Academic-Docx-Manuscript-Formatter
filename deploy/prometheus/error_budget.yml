groups:
  - name: scholarform-alerts
    rules:
      # Service Down
      - alert: ScholarFormServiceDown
        expr: up{job="scholarform"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ScholarForm backend is down"
          description: "Backend instance {{ $labels.instance }} has been unreachable for 2 minutes."
          runbook: "https://github.com/scholarform/docs/RUNBOOKS/service-down.md"

      # High Error Rate
      - alert: ScholarFormHighErrorRate
        expr: |
          sum(rate(http_requests_total{job="scholarform",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="scholarform"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on ScholarForm"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)."
          runbook: "https://github.com/scholarform/docs/RUNBOOKS/high-error-rate.md"

      # High Latency
      - alert: ScholarFormHighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="scholarform"}[5m]))
          > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on ScholarForm"
          description: "p95 latency is {{ $value }}s (threshold: 5s)."
          runbook: "https://github.com/scholarform/docs/RUNBOOKS/high-latency.md"

      # Database Connection Pool Exhaustion
      - alert: ScholarFormDBPoolExhausted
        expr: scholarform_db_pool_active_connections > 18
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value }} active connections out of 20."
          runbook: "https://github.com/scholarform/docs/RUNBOOKS/db-pool-exhausted.md"

      # Redis Memory High
      - alert: ScholarFormRedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 90%"
          description: "Redis memory at {{ $value | humanizePercentage }}."
          runbook: "https://github.com/scholarform/docs/RUNBOOKS/redis-memory.md"

      # Celery Queue Backlog
      - alert: ScholarFormQueueBacklog
        expr: scholarform_celery_queue_depth{queue="interactive"} > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Celery interactive queue backlog"
          description: "{{ $value }} jobs queued in interactive queue."
          runbook: "https://github.com/scholarform/docs/RUNBOOKS/queue-backlog.md"

      # API Key Rate Limit Exceeded Spike
      - alert: ScholarFormRateLimitSpike
        expr: rate(scholarform_api_key_rate_limited_total[5m]) > 10
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High rate of API key rate limit hits"
          description: "{{ $value }} rate limit rejections per second."

      # Disk Space Low
      - alert: ScholarFormDiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 10%"
          description: "Only {{ $value | humanizePercentage }} disk space remaining."
          runbook: "https://github.com/scholarform/docs/RUNBOOKS/disk-space.md"
